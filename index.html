<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#202326"><meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tresor"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icon.svg"><title>Tresor-Code</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#101214,#2b2f33,#090a0b);font-family:Arial,Helvetica,sans-serif;color:white;touch-action:manipulation;user-select:none}
.safe{width:min(94vw,980px);height:min(88vh,620px);padding:28px;border-radius:24px;background:linear-gradient(145deg,#60656a,#25282c);box-shadow:0 26px 70px rgba(0,0,0,.65),inset 0 0 45px rgba(255,255,255,.08)}
.warning{width:100%;height:100%;padding:22px;border-radius:16px;background:repeating-linear-gradient(135deg,#f4c62f 0 34px,#f4c62f 34px 48px,#111 48px 82px)}
.panel{position:relative;width:100%;height:100%;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:repeating-linear-gradient(18deg,rgba(255,255,255,.05) 0 2px,transparent 2px 22px),linear-gradient(140deg,#777,#3d4246 58%,#1e2124);box-shadow:inset 0 0 0 3px rgba(255,255,255,.14),inset 0 0 50px rgba(0,0,0,.45);overflow:hidden}
.alert-overlay{position:absolute;inset:0;z-index:8;pointer-events:none;opacity:0;background:radial-gradient(circle at center,rgba(255,0,0,0) 0%,rgba(255,0,0,.05) 34%,rgba(255,0,0,.24) 64%,rgba(255,0,0,.78) 100%);mix-blend-mode:screen}.alert-overlay.flash{animation:redFlash .9s ease-in-out 2}@keyframes redFlash{0%{opacity:0}22%{opacity:1}50%{opacity:.18}72%{opacity:.95}100%{opacity:0}}
.screw{position:absolute;width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ddd,#777 58%,#222);box-shadow:inset 0 0 0 3px rgba(0,0,0,.35);z-index:3}.screw:before,.screw:after{content:"";position:absolute;left:10px;right:10px;top:22px;height:4px;background:#222;border-radius:5px}.screw:before{transform:rotate(45deg)}.screw:after{transform:rotate(-45deg)}.tl{top:22px;left:22px}.tr{top:22px;right:22px}.bl{bottom:22px;left:22px}.br{bottom:22px;right:22px}
.title{font-size:clamp(22px,4vw,38px);font-weight:900;letter-spacing:.12em;text-transform:uppercase;text-shadow:0 3px 8px #000;z-index:4}.display{display:flex;gap:14px;z-index:4}.digit{width:clamp(56px,11vw,96px);height:clamp(72px,13vw,118px);border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(#101417,#252b2f);border:2px solid rgba(255,255,255,.22);font-size:clamp(38px,8vw,74px);font-weight:900;color:#dff8ff;box-shadow:inset 0 0 24px #000,0 8px 18px rgba(0,0,0,.35);text-shadow:0 0 12px rgba(120,230,255,.9)}
.keypad{display:grid;grid-template-columns:repeat(3,86px);gap:13px;z-index:4}.key{height:66px;border:0;border-radius:14px;color:white;background:linear-gradient(#626970,#23272b);font-size:34px;font-weight:900;box-shadow:0 7px 0 #111,0 11px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.22);cursor:pointer;touch-action:manipulation}.key:active,.key.pressed{transform:translateY(5px);box-shadow:0 2px 0 #111,0 6px 12px rgba(0,0,0,.35)}.clear{font-size:22px;background:linear-gradient(#7d4444,#301818)}.status{height:34px;font-size:28px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;z-index:4}.ok{color:#39e878;text-shadow:0 0 14px #39e878}.bad{color:#ff4a4a;text-shadow:0 0 14px #ff4a4a}.shake{animation:shake .26s linear 2}@keyframes shake{25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
.success{position:fixed;inset:0;display:none;place-items:center;text-align:center;padding:40px;background:radial-gradient(circle,#1b683b,#06150b 72%);z-index:10}.success.show{display:grid}.success h1{font-size:clamp(44px,9vw,100px);margin:0 0 16px}.success p{font-size:clamp(22px,4vw,40px);margin:0}@media(max-width:520px){.safe{height:96vh;padding:14px}.warning{padding:12px}.keypad{grid-template-columns:repeat(3,70px)}.key{height:58px}.screw{width:34px;height:34px}.screw:before,.screw:after{left:8px;right:8px;top:15px;height:3px}}
</style></head><body><main class="safe" id="safe"><div class="warning"><section class="panel"><div class="alert-overlay" id="alertOverlay"></div><div class="screw tl"></div><div class="screw tr"></div><div class="screw bl"></div><div class="screw br"></div><div class="title">Sicherheits-Code</div><div class="display"><div class="digit" id="d0">_</div><div class="digit" id="d1">_</div><div class="digit" id="d2">_</div><div class="digit" id="d3">_</div></div><div class="keypad" id="keypad"><button class="key" data-key="1" type="button">1</button><button class="key" data-key="2" type="button">2</button><button class="key" data-key="3" type="button">3</button><button class="key" data-key="4" type="button">4</button><button class="key" data-key="5" type="button">5</button><button class="key" data-key="6" type="button">6</button><button class="key" data-key="7" type="button">7</button><button class="key" data-key="8" type="button">8</button><button class="key" data-key="9" type="button">9</button><button class="key clear" data-clear="1" type="button">Löschen</button><button class="key" data-key="0" type="button">0</button><button class="key clear" data-clear="1" type="button">Reset</button></div><div class="status" id="status"></div></section></div></main><div class="success" id="success"><div><h1>Zugang gewährt</h1><p>Code 6543 ist korrekt.</p></div></div>
<script>(function(){var correctCode="6543",entered="";var safe=document.getElementById("safe"),status=document.getElementById("status"),success=document.getElementById("success"),alertOverlay=document.getElementById("alertOverlay");function updateDisplay(){for(var i=0;i<4;i++){document.getElementById("d"+i).textContent=entered.charAt(i)||"_"}}function triggerRedFlash(){alertOverlay.classList.remove("flash");void alertOverlay.offsetWidth;alertOverlay.classList.add("flash")}function clearCode(){entered="";updateDisplay();status.textContent="";status.className="status";safe.classList.remove("shake")}function press(num){if(entered.length>=4)return;entered+=String(num);updateDisplay();if(entered.length===4){if(entered===correctCode){status.textContent="Zugang gewährt";status.className="status ok";setTimeout(function(){success.classList.add("show")},650)}else{status.textContent="Falscher Code";status.className="status bad";safe.classList.add("shake");triggerRedFlash();setTimeout(clearCode,1850)}}}function handleButton(el){if(!el)return;if(el.getAttribute("data-clear"))clearCode();var k=el.getAttribute("data-key");if(k!==null)press(k)}document.getElementById("keypad").addEventListener("click",function(e){handleButton(e.target.closest("button"))});document.getElementById("keypad").addEventListener("touchstart",function(e){var el=e.target.closest("button");if(!el)return;e.preventDefault();el.classList.add("pressed");handleButton(el);setTimeout(function(){el.classList.remove("pressed")},120)},{passive:false});if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("service-worker.js").catch(function(){})})}updateDisplay()})();</script></body></html>
